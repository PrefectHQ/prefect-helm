{{- if .Values.role.create }}
apiVersion: {{ include "common.capabilities.rbac.apiVersion" . }}
kind: Role
metadata:
  name: {{ include "common.names.fullname" . }}
  namespace: {{ default (include "common.names.namespace" .) .Values.role.namespace | quote }}
  labels: {{- include "common.labels.standard" . | nindent 4 }}
    app.kubernetes.io/component: worker
    prefect-version: {{ .Chart.AppVersion }}
    {{- if .Values.commonLabels }}
    {{- include "common.tplvalues.render" ( dict "value" .Values.commonLabels "context" $ ) | nindent 4 }}
    {{- end }}
  {{- if .Values.commonAnnotations }}
  annotations: {{- include "common.tplvalues.render" ( dict "value" .Values.commonAnnotations "context" $ ) | nindent 4 }}
  {{- end }}
rules:
- apiGroups: [""]
  resources: ["events", "pods", "pods/log", "pods/status"]
  verbs: ["get", "watch", "list"]
- apiGroups: ["batch"]
  resources: ["jobs"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
{{- $cloudAutoSecret := and (eq .Values.worker.apiConfig "cloud") (eq (default "secretRef" .Values.worker.cloudApiConfig.jobApiKeyPropagation) "autoSecret") }}
{{- $cmcAutoSecret := and (eq .Values.worker.apiConfig "customerManagedCloud") (eq (default "secretRef" .Values.worker.customerManagedCloudApiConfig.jobApiKeyPropagation) "autoSecret") }}
{{- if or $cloudAutoSecret $cmcAutoSecret }}
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "list", "create", "update", "delete"]
{{- end }}
{{- if .Values.role.extraPermissions }}
{{- include "common.tplvalues.render" (dict "value" .Values.role.extraPermissions "context" $) | nindent 0 }}
{{- end }}
{{- end }}
